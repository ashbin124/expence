<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>Login | Expense Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="shell auth-shell">
      <section class="header">
        <h1>Account Access</h1>
        <p>Log in or create account. After success, you will return to the main page.</p>
      </section>

      <section class="card auth-card">
        <form id="authPageForm" novalidate>
          <div class="field">
            <label for="authPageEmail">Email</label>
            <input
              id="authPageEmail"
              name="authPageEmail"
              type="email"
              autocomplete="email"
              placeholder="you@example.com"
            />
          </div>
          <div class="field">
            <label for="authPagePassword">Password</label>
            <input
              id="authPagePassword"
              name="authPagePassword"
              type="password"
              autocomplete="current-password"
              minlength="6"
              placeholder="At least 6 characters"
            />
          </div>

          <div class="auth-page-actions">
            <button id="authPageLoginBtn" class="submit-btn" type="submit">Log In</button>
            <button id="authPageSignupBtn" class="ghost-btn" type="button">
              Sign Up
            </button>
            <button id="authPageBackBtn" class="ghost-btn" type="button">
              Back to Main Page
            </button>
          </div>

          <p id="authPageNotice" class="auth-notice" role="status" aria-live="polite"></p>
          <p id="authPageError" class="error" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script type="module" src="/src/auth-page.js"></script>
  </body>
</html>
